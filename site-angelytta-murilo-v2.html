<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angelytta & Murilo — Crepúsculo encontra Konoha</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a12;
  --gold: #d4af37;
  --orange: #ffb347;
  --blue: #aee3ff;
  --text: #eee;
  --muted: #999;
  --card: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: background 0.6s ease;
}

/* tema Forks (frio) e Konoha (quente) */
body.theme-forks { --bg: #0a1018; --gold: #9fc6dd; --orange: #aee3ff; }
body.theme-konoha { --bg: #160d05; --gold: #f57c1f; --blue: #ffd9a0; }

/* ===== barra de progresso de leitura ===== */
.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 4px;
  background: linear-gradient(90deg, #7d9aaa, #d4af37, #f57c1f);
  z-index: 1000;
  transition: width 0.1s linear;
  box-shadow: 0 0 10px rgba(212,175,55,0.7);
}

/* ===== navbar ===== */
.navbar {
  position: fixed;
  top: 4px; left: 0; right: 0;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 18px;
  background: rgba(10,10,18,0.85);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  transform: translateY(-110%);
  transition: transform 0.35s ease;
}
.navbar.visible { transform: translateY(0); }
.navbar .brand {
  font-size: 0.95rem;
  letter-spacing: 1px;
  color: var(--gold);
  white-space: nowrap;
  cursor: pointer;
}
.navbar nav {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.navbar nav::-webkit-scrollbar { display: none; }
.navbar nav button {
  font-family: inherit;
  font-size: 0.78rem;
  padding: 7px 12px;
  border-radius: 18px;
  border: 1px solid transparent;
  background: transparent;
  color: #bbb;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s;
}
.navbar nav button:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
.navbar nav button.active {
  color: #14141e;
  background: var(--gold);
  border-color: var(--gold);
  font-weight: bold;
}

/* ===== toggle de tema ===== */
.theme-toggle {
  display: flex;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  overflow: hidden;
  flex: 0 0 auto;
}
.theme-toggle button {
  font-family: inherit;
  font-size: 0.75rem;
  padding: 6px 10px;
  border: none;
  background: transparent;
  color: #999;
  cursor: pointer;
  transition: all 0.25s;
}
.theme-toggle button.on-forks { background: #1b3a4b; color: #aee3ff; }
.theme-toggle button.on-konoha { background: #b3541e; color: #ffe1bd; }

/* ===== reveal ao rolar ===== */
.reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.in { opacity: 1; transform: none; }

/* ===== hero ===== */
.hero { display: flex; min-height: 100vh; position: relative; flex-wrap: wrap; }

/* foto do casal como fundo do hero inteiro */
.hero-photo {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center 30%;
  background-repeat: no-repeat;
  z-index: 0;
}

.hero-half {
  flex: 1 1 320px;
  min-height: 50vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 30px;
  position: relative;
  overflow: hidden;
  transition: filter 0.5s ease;
  z-index: 1;
}
.hero-half.dim { filter: brightness(0.45) saturate(0.6); }

/* painéis de vidro (glassmorphism) sobre a foto */
.hero-half.glass {
  backdrop-filter: blur(4px) saturate(1.15);
  -webkit-backdrop-filter: blur(4px) saturate(1.15);
  border: 1px solid rgba(255,255,255,0.12);
}
.forks {
  background: linear-gradient(180deg, rgba(13,27,42,0.50) 0%, rgba(27,58,75,0.34) 55%, rgba(44,79,94,0.30) 100%);
  box-shadow: inset -40px 0 80px -40px rgba(13,27,42,0.6);
}
.forks::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(125,154,170,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 30%, rgba(125,154,170,0.10) 0%, transparent 40%),
    linear-gradient(120deg, rgba(255,255,255,0.08) 0%, transparent 28%);
  pointer-events: none;
}
.konoha {
  background: linear-gradient(180deg, rgba(90,45,12,0.48) 0%, rgba(179,84,30,0.32) 55%, rgba(245,124,31,0.28) 130%);
  box-shadow: inset 40px 0 80px -40px rgba(60,25,5,0.6);
}
.konoha::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 70% 20%, rgba(255,200,100,0.20) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 90%, rgba(255,120,30,0.14) 0%, transparent 45%),
    linear-gradient(-120deg, rgba(255,255,255,0.08) 0%, transparent 28%);
  pointer-events: none;
}
.hero-half h2 {
  font-size: 2rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 18px 0 8px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  z-index: 1;
}
.hero-half p.sub { font-style: italic; opacity: 0.85; z-index: 1; text-align: center; max-width: 320px; }
.hero-half .icon { z-index: 1; animation: floaty 5s ease-in-out infinite; }
.hero-half.konoha .icon { animation-delay: 2.5s; }
@keyframes floaty {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.hero-center {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  text-align: center;
  background: rgba(10,10,18,0.82);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 30px 40px;
  backdrop-filter: blur(4px);
  box-shadow: 0 0 60px rgba(0,0,0,0.7);
}
.hero-center h1 {
  font-size: 2.4rem;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #aee3ff 0%, #ffffff 50%, #ffb347 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-center .amp { font-size: 1.4rem; color: var(--gold); }
.hero-center p { margin-top: 10px; font-style: italic; color: #cfcfcf; font-size: 0.95rem; }
.hero-center .heart-btn {
  margin-top: 14px;
  font-size: 1.6rem;
  background: none;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
  line-height: 1;
}
.hero-center .heart-btn:hover { transform: scale(1.25); }
.hero-center .heart-btn:active { transform: scale(0.9); }
.scroll-hint {
  position: absolute;
  bottom: 18px; left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  color: rgba(255,255,255,0.7);
  font-size: 1.4rem;
  animation: bounceDown 1.8s ease-in-out infinite;
  cursor: pointer;
  background: none;
  border: none;
}
@keyframes bounceDown {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
  50% { transform: translateX(-50%) translateY(8px); opacity: 1; }
}
@media (max-width: 700px) {
  .hero-center { position: static; transform: none; margin: -40px auto 40px; width: 90%; }
  .hero { flex-direction: column; }
}

/* corações flutuantes */
.float-heart {
  position: fixed;
  z-index: 1200;
  font-size: 1.4rem;
  pointer-events: none;
  animation: heartUp 2.6s ease-out forwards;
}
@keyframes heartUp {
  0% { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-50vh) scale(1.4) rotate(28deg); opacity: 0; }
}

/* ===== seções ===== */
section { padding: 80px 20px; max-width: 900px; margin: 0 auto; scroll-margin-top: 70px; }
.section-title { text-align: center; font-size: 1.9rem; margin-bottom: 12px; letter-spacing: 2px; }
.section-sub { text-align: center; font-style: italic; color: var(--muted); margin-bottom: 45px; }
.divider { text-align: center; font-size: 1.5rem; padding: 10px 0; color: var(--gold); letter-spacing: 12px; }

/* ===== contador ===== */
.counter-wrap {
  background: linear-gradient(135deg, rgba(27,58,75,0.55), rgba(90,45,12,0.55));
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 20px;
  padding: 45px 25px;
  text-align: center;
}
.counter-wrap .moon { font-size: 2.2rem; }
.counter { display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; margin: 28px 0 18px; }
.counter .box {
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 18px 10px;
  min-width: 92px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.counter .box:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(212,175,55,0.25);
}
.counter .num {
  font-size: 2.3rem;
  font-weight: bold;
  color: var(--orange);
  font-variant-numeric: tabular-nums;
}
.counter .num.tick { animation: pulseNum 0.5s ease; }
@keyframes pulseNum {
  0% { transform: scale(1); }
  40% { transform: scale(1.18); color: #fff; }
  100% { transform: scale(1); }
}
.counter .label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--blue);
  margin-top: 6px;
}
.counter-wrap .since { font-style: italic; color: #ccc; font-size: 0.95rem; }
.milestone {
  margin-top: 18px;
  font-size: 0.88rem;
  color: var(--gold);
  font-style: italic;
}
.milestone .bar {
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.12);
  margin: 10px auto 6px;
  max-width: 420px;
  overflow: hidden;
}
.milestone .fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #7d9aaa, #d4af37, #f57c1f);
  transition: width 1.2s ease;
}

/* ===== linha do tempo ===== */
.timeline { position: relative; padding-left: 30px; }
.timeline::before {
  content: "";
  position: absolute;
  left: 8px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, #7d9aaa, #d4af37, #f57c1f);
}
.tl-item {
  position: relative;
  margin-bottom: 38px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 20px 24px;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  cursor: default;
}
.tl-item:hover {
  transform: translateX(8px);
  border-color: rgba(212,175,55,0.5);
  box-shadow: 0 6px 24px rgba(0,0,0,0.4);
}
.tl-item::before {
  content: "";
  position: absolute;
  left: -28px; top: 26px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 12px var(--gold);
}
.tl-item h3 { color: var(--orange); margin-bottom: 6px; font-size: 1.15rem; }
.tl-item .saga { color: var(--blue); font-style: italic; font-size: 0.85rem; display: block; margin-bottom: 8px; }
.tl-item p { color: #ccc; font-size: 0.95rem; line-height: 1.6; }

/* ===== carta ===== */
.letter-fold {
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
}
.letter-fold .envelope {
  font-size: 4rem;
  cursor: pointer;
  background: none;
  border: none;
  transition: transform 0.25s ease;
  animation: floaty 4s ease-in-out infinite;
}
.letter-fold .envelope:hover { transform: scale(1.15) rotate(-4deg); }
.letter-fold .hint { color: var(--muted); font-style: italic; font-size: 0.9rem; margin-top: 8px; }
.letter {
  background: #f5ecd9;
  color: #2e2418;
  border-radius: 6px;
  padding: 50px 45px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 60px rgba(160,130,80,0.15);
  font-size: 1.05rem;
  line-height: 1.9;
  position: relative;
  max-width: 640px;
  margin: 0 auto;
  text-align: left;
  animation: unfold 0.7s ease;
  transform-origin: top center;
}
@keyframes unfold {
  0% { transform: scaleY(0.1); opacity: 0; }
  100% { transform: scaleY(1); opacity: 1; }
}
.letter .dear { font-size: 1.3rem; margin-bottom: 18px; font-style: italic; }
.letter p + p { margin-top: 14px; }
.letter .sign { margin-top: 28px; text-align: right; font-style: italic; }
.letter .seal {
  margin-top: 18px;
  text-align: right;
  font-size: 0.8rem;
  color: #b3411e;
  letter-spacing: 1px;
}
.letter .close-letter {
  display: block;
  margin: 22px auto 0;
  font-family: inherit;
  font-size: 0.85rem;
  background: none;
  border: 1px solid #b3411e;
  color: #b3411e;
  border-radius: 18px;
  padding: 7px 18px;
  cursor: pointer;
}
.uzumaki-seal { display: inline-block; width: 46px; height: 46px; vertical-align: middle; }

/* ===== quiz ===== */
.quiz-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 34px 30px;
  max-width: 640px;
  margin: 0 auto;
}
.quiz-progress {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
}
.quiz-progress span {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.12);
  transition: background 0.3s;
}
.quiz-progress span.done { background: var(--gold); }
.quiz-q { margin-bottom: 26px; }
.quiz-q p { margin-bottom: 12px; color: #eee; font-weight: bold; }
.quiz-q button {
  font-family: inherit;
  font-size: 0.92rem;
  margin: 4px 6px 4px 0;
  padding: 10px 16px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.35);
  color: #ddd;
  cursor: pointer;
  transition: all 0.2s;
}
.quiz-q button:hover { border-color: var(--gold); color: #fff; transform: translateY(-2px); }
.quiz-q button.sel-c { background: #1b3a4b; border-color: #aee3ff; color: #aee3ff; }
.quiz-q button.sel-u { background: #b3541e; border-color: #ffb347; color: #fff; }
.quiz-result {
  margin-top: 20px;
  text-align: center;
  font-size: 1.15rem;
  color: var(--orange);
  min-height: 30px;
  font-style: italic;
  animation: popIn 0.45s ease;
}
@keyframes popIn {
  0% { transform: scale(0.6); opacity: 0; }
  70% { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}
.quiz-go {
  display: block;
  margin: 10px auto 0;
  padding: 12px 34px;
  font-family: inherit;
  font-size: 1rem;
  background: linear-gradient(90deg, #1b3a4b, #b3541e);
  color: #fff;
  border: 1px solid var(--gold);
  border-radius: 30px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: filter 0.2s, transform 0.2s;
}
.quiz-go:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-2px); }
.quiz-go:disabled { opacity: 0.45; cursor: not-allowed; }
.quiz-reset {
  display: block;
  margin: 14px auto 0;
  font-family: inherit;
  font-size: 0.82rem;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  text-decoration: underline;
}

/* ===== playlist ===== */
.playlist {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(390px, 100%), 1fr));
  gap: 22px;
  max-width: 860px;
  margin: 0 auto;
}
.track {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 18px 20px 20px;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.track:hover { transform: translateY(-4px); box-shadow: 0 10px 26px rgba(0,0,0,0.45); }
.track-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.track .track-info { flex: 1; }
.track .note { font-size: 1.5rem; }
.track .t-name { font-weight: bold; color: #fff; font-size: 0.98rem; }
.track .t-from { font-size: 0.8rem; color: var(--muted); font-style: italic; }
.track.tw { border-left: 4px solid #7d9aaa; }
.track.nr { border-left: 4px solid #f57c1f; }
.track .player iframe {
  width: 100%;
  height: 152px;
  border: 0;
  border-radius: 12px;
  display: block;
}
.playlist-note {
  text-align: center;
  color: #888;
  font-size: 0.85rem;
  font-style: italic;
  margin-top: 24px;
}

/* ===== promessa ===== */
.promise {
  text-align: center;
  background: radial-gradient(ellipse at center, rgba(212,175,55,0.12) 0%, transparent 70%);
  border-radius: 20px;
  padding: 60px 25px;
}
.promise blockquote {
  font-size: 1.25rem;
  font-style: italic;
  line-height: 2;
  max-width: 620px;
  margin: 0 auto 30px;
  color: #eee;
}
.promise .names { font-size: 1.5rem; color: var(--gold); letter-spacing: 3px; }
.promise .date { color: var(--muted); margin-top: 8px; font-style: italic; }

footer {
  text-align: center;
  padding: 35px 20px 45px;
  color: #777;
  font-size: 0.85rem;
  font-style: italic;
  border-top: 1px solid rgba(255,255,255,0.08);
}

/* ===== voltar ao topo ===== */
.to-top {
  position: fixed;
  right: 22px; bottom: 22px;
  z-index: 900;
  width: 50px; height: 50px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  background: rgba(10,10,18,0.85);
  color: var(--gold);
  font-size: 1.2rem;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: translateY(14px);
  transition: all 0.3s ease;
  backdrop-filter: blur(6px);
}
.to-top.show { opacity: 1; pointer-events: auto; transform: none; }
.to-top:hover { background: var(--gold); color: #14141e; }

/* ===== toast ===== */
.toast {
  position: fixed;
  left: 50%; bottom: 28px;
  transform: translateX(-50%) translateY(80px);
  z-index: 1100;
  background: rgba(20,20,30,0.95);
  border: 1px solid var(--gold);
  color: #f3e9c8;
  padding: 12px 22px;
  border-radius: 30px;
  font-size: 0.9rem;
  font-style: italic;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  transition: transform 0.35s ease;
  max-width: 90vw;
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
  html { scroll-behavior: auto; }
}

</style>
</head>
<body>
